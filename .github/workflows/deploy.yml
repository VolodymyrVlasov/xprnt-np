name: Deploy to xprnt-office

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, office]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: /opt/xprnt/nova-local
          clean: false

      - name: Install dependencies
        run: |
          cd /opt/xprnt/nova-local
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Restart service
        run: |
          sudo systemctl restart nova-local
