name: Deploy to xprnt-office

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, office]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd $GITHUB_WORKSPACE
          docker compose down
          docker compose up -d --build
