name: Deploy to xprnt-office

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, office]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy .env
        run: |
          cp /opt/xprnt/nova-local/.env $GITHUB_WORKSPACE/.env

      - name: Stop old container
        run: |
          docker stop nova-ttn || true
          docker rm nova-ttn || true

      - name: Deploy
        run: |
          cd $GITHUB_WORKSPACE
          docker compose up -d --build
