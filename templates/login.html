<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XPRNT · Вхід</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center font-sans">

  <div class="w-full max-w-sm mx-4">

    <!-- Card -->
    <div class="bg-gray-800 rounded-2xl border border-gray-700 p-10 flex flex-col items-center gap-6 shadow-2xl">

      <!-- Logo -->
      <div class="flex flex-col items-center gap-2">
        <div class="w-14 h-14 rounded-2xl bg-red-600/20 border border-red-600/30
                    flex items-center justify-center">
          <svg class="w-7 h-7 text-red-400" fill="none" stroke="currentColor"
               stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 12h6m-6 4h6m2 4H7a2 2 0 01-2-2V6a2 2 0
                     012-2h5l5 5v11a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-wide text-white">XPRNT</h1>
        <p class="text-sm text-gray-500 text-center">
          Система управління відправленнями
        </p>
      </div>

      <!-- Google login button -->
      <a href="{{ url_for('google.login') }}"
         class="w-full flex items-center justify-center gap-3
                bg-white hover:bg-gray-50 active:bg-gray-100
                text-gray-800 font-medium
                px-6 py-3 rounded-xl shadow-md
                transition-colors duration-150 select-none">
        <!-- Google "G" logo SVG -->
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
          <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92
                   c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57
                   c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77
                   c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93
                   -6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43
                   .35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45
                   1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15
                   C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07
                   l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Увійти через Google
      </a>

      <!-- Footer note -->
      <p class="text-xs text-gray-600 text-center">
        Доступ тільки для авторизованих користувачів
      </p>

    </div>
  </div>

</body>
</html>
